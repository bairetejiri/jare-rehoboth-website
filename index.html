<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jare Rehoboth Nigeria Enterprise</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f4ee;
      color: #222;
    }
    nav {
      background: #2f6b2f;
      color: white;
      padding: 15px 20px;
      font-weight: bold;
    }
    .hero {
      background: #3d7c3d;
      color: white;
      text-align: center;
      padding: 50px 20px;
    }
    section {
      max-width: 900px;
      margin: auto;
      padding: 30px 20px;
    }
    h2 {
      color: #2f6b2f;
    }
    .price-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-top: 20px;
    }
    .price {
      font-size: 28px;
      font-weight: bold;
      color: #d97706;
    }
    footer {
      background: #222;
      color: #ccc;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <nav>Jare Rehoboth Nigeria Enterprise</nav>

  <div class="hero">
    <h1>Trusted Palm Oil Depot & Agro Trading Partner</h1>
    <p>Okitipupa, Ondo State, Nigeria</p>
  </div>

  <section>
    <h2>Current Palm Oil Price</h2>
    <div class="price-box">
      <p class="price" id="oilPrice">Loading price...</p>
      <p>Storage fee per drum: <span id="storageFee">Loading...</span></p>
    </div>
  </section>

  <section>
    <h2>About Us</h2>
    <p id="aboutText">Loading...</p>
  </section>

  <footer>
    &copy; 2025 Jare Rehoboth Nigeria Enterprise
  </footer>

  <script>
    fetch('./data.json')
      .then(function(response) {
        if (!response.ok) {
          throw new Error('data.json not found');
        }
        return response.json();
      })
      .then(function(data) {
        document.getElementById('oilPrice').textContent = data.oil_price;
        document.getElementById('storageFee').textContent = '₦' + Number(data.storage_fee).toLocaleString();
        document.getElementById('aboutText').textContent = data.about;
      })
      .catch(function(error) {
        document.getElementById('oilPrice').textContent = '₦320,000';
        document.getElementById('storageFee').textContent = '₦5,000';
        document.getElementById('aboutText').textContent = 'Jare Rehoboth Nigeria Enterprise — Buy, Store and Sell Crude Palm Oil.';
        console.log('Error loading data:', error);
      });
  </script>
</body>
</html>
